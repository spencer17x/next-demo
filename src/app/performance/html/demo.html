<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        @keyframes backgroundFade {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
      .item {
        position: relative;
        width: 34%;
        text-align: right;
        display: flex;
        justify-content: flex-end;
      }
      .animating::before {
        content: '';
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(204, 61, 61, 0.11);
        z-index: 0;
        animation: backgroundFade 0.5s linear;
      }
    </style>
  </head>
  <body>
    <div>
      <div>App</div>
      <div class="list"></div>
    </div>
    <script>
      const list = document.querySelector(".list");
      for (let i = 0; i < 10; i++) {
        const item = document.createElement("div");
        const text = document.createElement('span');
        text.textContent = Math.random();
        const animating = document.createElement('div');
        animating.classList.add('animating');
        item.appendChild(text);
        item.appendChild(animating);
        item.classList.add("item");
        list.appendChild(item);
      }
      // 每隔500ms更新值
      setInterval(() => {
        const children = list.children;
        for (let i = 0; i < children.length; i++) {
          const item = children[i];
          const textNode = item.querySelector('span').firstChild;
          textNode.nodeValue = Math.random();
        }
      }, 500)
    </script>
    </script>
  </body>
</html>
